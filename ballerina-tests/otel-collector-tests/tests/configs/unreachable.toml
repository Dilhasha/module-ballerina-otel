# Unreachable endpoint scenario: traces and metrics are exported to a port
# nothing listens on (:4390). The application must keep serving requests
# while every export attempt fails, and nothing may reach the test sink.
# Copied to tests/Config.toml by the Gradle build. A distinct service.name
# isolates this run's telemetry from any late/retried exports of other
# scenario runs still in the collector.
scenario = "unreachable"
expectedServiceName = "ballerina-otel-unreachable-tests"

[ballerina.observe]
tracingEnabled = true
tracingProvider = "otel"
metricsEnabled = true
metricsReporter = "otel"

[ballerina.otel]
tracesEndpoint = "http://localhost:4390/v1/traces"
tracesProtocol = "http/protobuf"
tracesSampler = "always_on"
metricsEndpoint = "http://localhost:4390/v1/metrics"
metricsProtocol = "http/protobuf"
metricsExportIntervalMillis = 3000

[ballerina.otel.tracesResourceAttributes]
"service.name" = "ballerina-otel-unreachable-tests"
"deployment.environment" = "test"

[ballerina.otel.metricsResourceAttributes]
"service.name" = "ballerina-otel-unreachable-tests"
"deployment.environment" = "test"

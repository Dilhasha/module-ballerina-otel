services:
  jaeger:
    image: jaegertracing/all-in-one:1.62.0
    container_name: jaeger-test
    environment:
      - COLLECTOR_OTLP_ENABLED=true
    # Non-default host ports for the same reason as the collector tests: local
    # observability agents often already listen on the standard OTLP ports
    # 4317/4318 (and a locally running Jaeger on 16686) on developer machines,
    # and would silently swallow the exports / queries.
    ports:
      - "24317:4317" # OTLP/gRPC receiver
      - "24318:4318" # OTLP/HTTP receiver
      - "26686:16686" # Query API / UI
    # Jaeger never dials back to the host (the tests query its API from the
    # host side), so no host.docker.internal mapping is needed here.

# The Ballerina package under test exports OTLP/HTTP (host port :14318) or
# OTLP/gRPC (host port :14317) to this collector (see the port mappings in
# docker-compose.yml). The collector forwards everything it receives as
# OTLP/JSON to the test sink service started by the Ballerina test suite on the
# host (:9095), so the tests can assert on exactly what a real collector
# received and processed.

receivers:
  otlp:
    protocols:
      http:
        endpoint: 0.0.0.0:4318
      grpc:
        endpoint: 0.0.0.0:4317

processors:
  batch:
    timeout: 1s

exporters:
  otlphttp/testsink:
    endpoint: http://host.docker.internal:9095
    encoding: json
    compression: none
    tls:
      insecure: true
  debug: {}

service:
  pipelines:
    traces:
      receivers: [otlp]
      processors: [batch]
      exporters: [otlphttp/testsink, debug]
    metrics:
      receivers: [otlp]
      processors: [batch]
      exporters: [otlphttp/testsink, debug]

[package]
org = "ballerina"
name = "otel"
version = "0.9.0"
keywords = ["Type/Driver", "Area/Developer Tools", "Vendor/Otel", "Observability", "tracing"]
distribution = "2201.13.4"

[platform.java21]
graalvmCompatible = true

[[platform.java21.dependency]]
path = "../native/build/libs/otel-extension-native-0.9.0-SNAPSHOT.jar"
groupId = "ballerina"
artifactId = "otel-extension-native"
version = "0.9.0-SNAPSHOT"

[[platform.java21.dependency]]
path = "./lib/opentelemetry-sdk-trace-1.32.0.jar"
groupId = "io.opentelemetry"
artifactId = "opentelemetry-sdk-trace"
version = "1.32.0"

[[platform.java21.dependency]]
path = "./lib/opentelemetry-sdk-metrics-1.32.0.jar"
groupId = "io.opentelemetry"
artifactId = "opentelemetry-sdk-metrics"
version = "1.32.0"

[[platform.java21.dependency]]
path = "./lib/opentelemetry-sdk-common-1.32.0.jar"
groupId = "io.opentelemetry"
artifactId = "opentelemetry-sdk-common"
version = "1.32.0"

[[platform.java21.dependency]]
path = "./lib/opentelemetry-extension-incubator-1.32.0-alpha.jar"
groupId = "io.opentelemetry"
artifactId = "opentelemetry-extension-incubator"
version = "1.32.0-alpha"

# NOTE: opentelemetry-api and opentelemetry-context are intentionally not
# packed: ballerina-rt shades both artifacts and its copies always win
# classloading. opentelemetry-sdk-logs is intentionally not packed: only the
# (unused) OTLP log exporter classes reference it. opentelemetry-semconv is
# not needed: the only used constant (service.name) is inlined in the native
# code.

[[platform.java21.dependency]]
path = "./lib/opentelemetry-exporter-otlp-1.32.0.jar"
groupId = "io.opentelemetry"
artifactId = "opentelemetry-exporter-otlp"
version = "1.32.0"

[[platform.java21.dependency]]
path = "./lib/opentelemetry-exporter-otlp-common-1.32.0.jar"
groupId = "io.opentelemetry"
artifactId = "opentelemetry-exporter-otlp-common"
version = "1.32.0"

[[platform.java21.dependency]]
path = "./lib/opentelemetry-exporter-common-1.32.0.jar"
groupId = "io.opentelemetry"
artifactId = "opentelemetry-exporter-common"
version = "1.32.0"

[[platform.java21.dependency]]
path = "./lib/opentelemetry-exporter-sender-okhttp-1.32.0.jar"
groupId = "io.opentelemetry"
artifactId = "opentelemetry-exporter-sender-okhttp"
version = "1.32.0"

[[platform.java21.dependency]]
path = "./lib/opentelemetry-sdk-extension-autoconfigure-spi-1.32.0.jar"
groupId = "io.opentelemetry"
artifactId = "opentelemetry-sdk-extension-autoconfigure-spi"
version = "1.32.0"

[[platform.java21.dependency]]
path = "./lib/okhttp-4.12.0.jar"
groupId = "com.squareup.okhttp3"
artifactId = "okhttp"
version = "4.12.0"

[[platform.java21.dependency]]
path = "./lib/okio-jvm-3.9.0.jar"
groupId = "com.squareup.okio"
artifactId = "okio-jvm"
version = "3.9.0"

# kotlin-stdlib is bundled as a ProGuard-shrunk jar (see the size-reduction-test
# subproject): only the classes reachable from okhttp/okio are kept.
[[platform.java21.dependency]]
path = "./lib/kotlin-stdlib-1.9.23-slim.jar"
groupId = "org.jetbrains.kotlin"
artifactId = "kotlin-stdlib"
version = "1.9.23"

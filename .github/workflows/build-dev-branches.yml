name: Build Dev Branches

on:
  workflow_dispatch:
    inputs:
      ballerina_version:
        description: 'Ballerina version'
        required: true
        default: '2201.13.4'
  push:
    branches-ignore:
      - main
      - "automated/dependency_version_update"
      - "automated/dependency_version_update_tmp"

env:
  BALLERINA_DISTRIBUTION_VERSION: 2201.13.4    # Update this with the latest Ballerina version

jobs:
  ubuntu-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v7
        with:
          persist-credentials: false
      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: 21.0.3
      - name: Set up Ballerina
        if: github.event_name == 'workflow_dispatch'
        uses: ballerina-platform/setup-ballerina@v1.1.3
        with:
          version: ${{ github.event.inputs.ballerina_version }}
      - name: Set up Ballerina
        if: github.event_name == 'push'
        uses: ballerina-platform/setup-ballerina@v1.1.3
        with:
          version: ${{ env.BALLERINA_DISTRIBUTION_VERSION }}
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew
      - name: Build with Gradle
        env:
          packageUser: ${{ github.actor }}
          packagePAT: ${{ secrets.GITHUB_TOKEN }}
        run: ./gradlew clean build --stacktrace --scan --console=plain --no-daemon

  windows-build:
    if: false # because there is no opentelemetry-otel-executable available
    runs-on: windows-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v7
        with:
          persist-credentials: false
      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: 21.0.3
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew
      - name: Download Otel server executable
        env:
          OTEL_VERSION: 1.21.0
        run: |
          Invoke-WebRequest https://github.com/oteltracing/otel/releases/download/v$env:OTEL_VERSION/otel-$env:OTEL_VERSION-windows-amd64.tar.gz -O otel.tar.gz
          tar -xzvf otel.tar.gz
          mv otel-$env:OTEL_VERSION-windows-amd64 otel
          echo "OTEL_SERVER_EXECUTABLE=$(Resolve-Path otel\otel-all-in-one.exe)" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
      - name: Build with Gradle
        env:
          packageUser: ${{ github.actor }}
          packagePAT: ${{ secrets.GITHUB_TOKEN }}
        run: ./gradlew.bat clean build --stacktrace --scan --console=plain --no-daemon

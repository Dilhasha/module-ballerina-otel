plugins {
    id "com.gradle.enterprise" version "3.2"
}

rootProject.name = 'module-ballerina-otel'

include(':build-config:checkstyle')
include(':otel-extension-ballerina')
include(':otel-extension-native')

project(':build-config:checkstyle').projectDir = file('build-config/checkstyle')
project(':otel-extension-ballerina').projectDir = file('ballerina')
project(':otel-extension-native').projectDir = file('native')

gradleEnterprise {
    buildScan {
        termsOfServiceUrl = 'https://gradle.com/terms-of-service'
        termsOfServiceAgree = 'yes'
    }
}
